<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Spinner circular animado */
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #e5e7eb;
            border-top-color: #FF5414;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .selected-row {
            background-color: #dbeafe !important;
        }
        
        tr:hover {
            background-color: #f3f4f6;
        }
        
        .selected-row:hover {
            background-color: #bfdbfe !important;
        }


        .error {
            border-color: #ef4444 !important;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
        }
        .success-message {
            background-color: #10b981;
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            position: absolute;
            display: none;
            width: 30%;
            bottom: 50px;
            right: 50px;
        }
        .error-message_request {
            background-color: red;
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-7xl mx-auto">
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Monitoramento de Produtos</h1>
                <div class="flex gap-3">
                    <button id="editBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:bg-gray-300 disabled:cursor-not-allowed" disabled>
                        Editar Selecionado
                    </button>
                    <button id="deleteBtn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition disabled:bg-gray-300 disabled:cursor-not-allowed" disabled>
                        Excluir Selecionados
                    </button>
                    <button id="addBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                        Adicionar
                    </button>
                </div>
            </div>

            <!-- FILTROS -->
            <div class="flex gap-3 mb-4">
                <select id="filterLoja" class="px-3 py-2 border rounded-lg w-1/3">
                    <option value="">Todos as Lojas</option>
                    {% for loja in lojas %}
                    <option value="{{ loja }}">{{ loja }}</option>
                    {% endfor %}
                </select>

                <select id="filterEstado" class="px-3 py-2 border rounded-lg w-1/3">
                    <option value="">Todos os Estados</option>
                    {% for estado in ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"] %}
                    <option value="{{ estado }}">{{ estado }}</option>
                    {% endfor %}
                </select>
                <input type="text" id="filterSku" placeholder="Filtrar por SKU" class="px-3 py-2 border rounded-lg w-1/3">
            </div>

            {% if items|length == 0 %}
                <div id="emptyState" class="text-center py-12 text-gray-500">
                    Nenhum produto cadastrado
                </div>
            {% else %}

                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead>
                            <tr class="bg-gray-100 border-b-2 border-gray-300">
                                <th class="p-3 text-left">
                                    <input type="checkbox" id="selectAll" class="w-4 h-4 cursor-pointer">
                                </th>
                                <th class="p-3 text-left font-semibold text-gray-700">LOJA</th>
                                <th class="p-3 text-left font-semibold text-gray-700">LINK</th>
                                <th class="p-3 text-left font-semibold text-gray-700">SKU</th>
                                <th class="p-3 text-left font-semibold text-gray-700">PRODUTO</th>
                                <th class="p-3 text-left font-semibold text-gray-700">CEP</th>
                                <th class="p-3 text-left font-semibold text-gray-700">ESTADO</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            {% endif %}

        </div>
    </div>

    <!-- Mensagem de Sucesso -->
    <div class="success-message" id="successMessage">
        ✓ Produto cadastrado com sucesso!
    </div>

    <!-- Mensagem de Erro -->
    <div class="error-message_request" id="errorMessageRequest">
        X Erro ao cadastrar produto!
    </div>
    <!-- Carregando -->
    <div id="loadingBkg" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="spinner"></div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6">

                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Link</label>

                </div>

                    <label class="block text-sm font-medium text-gray-700 mb-1">CEP</label>
                    <input type="text" id="editCep" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" maxlength="9" required>
                </div>

                    <select id="editEstado" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>

                </div>
                
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                        Salvar
                    </button>
                    <button type="button" id="cancelEdit" class="flex-1 px-4 py-2 bg-red-300 text-white rounded-lg hover:bg-red-400 transition">

            </form>
        </div>
    </div>

    <div id="addModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Adicionar Produto</h2>

                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Link</label>
                    <input type="url" id="addLink" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">SKU</label>
                    <input type="text" id="addSku" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Produto</label>

                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
                    <select id="addEstado" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                        <option value="">Selecione</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>

    <div id="confirmDelete" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Confirmação</h2>
            <h3 id="deleteText" class="text-md font-medium text-gray-600 mb-4"></h3>
            <div class="flex gap-3 pt-4">
                <button type="button" onclick=delete_product() id="confirmDelete" class="flex-1 px-4 py-2 bg-red-300 text-white rounded-lg hover:bg-red-400 transition">
                    Sim
                </button>
                <button type="button" id="cancelDelete" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <script>

        let produtos = {{ items | tojson }};

        const estadoPadrao = "SP"; // valor que você quer selecionar
        document.getElementById('filterEstado').value = estadoPadrao;

        // Atualizar estado dos botões
        function updateButtonStates() {
            const checkboxes = document.querySelectorAll('.row-checkbox:checked');
            const editBtn = document.getElementById('editBtn');
            const deleteBtn = document.getElementById('deleteBtn');
            
            editBtn.disabled = checkboxes.length !== 1;
            deleteBtn.disabled = checkboxes.length === 0;
        }

        document.getElementById('filterLoja').addEventListener('input', applyFilters);
        document.getElementById('filterEstado').addEventListener('change', applyFilters);
        document.getElementById('filterSku').addEventListener('input', applyFilters);

        function renderTable(data = produtos) {
            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            if (data.length === 0) {
                tableBody.innerHTML = '';
                if(emptyState) emptyState.classList.remove('hidden');
                return;
            }
            if(emptyState) emptyState.classList.add('hidden');

            tableBody.innerHTML = data.map(item => `
                <tr class="border-b border-gray-200" id="${item.SKU}">
                    <td class="p-3"><input type="checkbox" class="row-checkbox w-4 h-4 cursor-pointer" data-id="${item.SKU}"></td>
                    <td id="productStore" class="p-3 text-gray-800">${item.LOJA}</td>
                    <td class="p-3">
                        <a id="productLink" href="${item.LINK}" target="_blank" class="text-blue-600 hover:underline">
                            ${ item.LINK.length > 35 ? item.LINK.substring(0, 35) + '...' : item.LINK }
                        </a>
                    </td>
                    <td id="productSku" class="p-3 text-gray-800 font-mono">${item.SKU}</td>
                    <td id="productName" class="p-3 text-gray-800">${item.PRODUTO}</td>
                    <td id="productCep" class="p-3 text-gray-800">${item.CEP}</td>
                    <td id="productState" class="p-3 text-gray-800 font-semibold">${item.ESTADO}</td>
                </tr>
            `).join('');
            updateButtonStates();
        }

        function applyFilters() {
            const lojaFilter = document.getElementById('filterLoja').value.toLowerCase();
            const estadoFilter = document.getElementById('filterEstado').value;
            const skuFilter = document.getElementById('filterSku').value.toLowerCase();

            const filtered = produtos.filter(prod => {
                return prod.LOJA.toLowerCase().includes(lojaFilter) &&
                       (estadoFilter === "" || prod.ESTADO === estadoFilter) &&
                       prod.SKU.toLowerCase().includes(skuFilter);
            });

            renderTable(filtered);
        }

        // Selecionar/desselecionar todas as linhas
        document.getElementById('selectAll').addEventListener('change', function(e) {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            checkboxes.forEach(checkbox => {
                checkbox.checked = e.target.checked;
                const row = checkbox.closest('tr');
                if (e.target.checked) {
                    row.classList.add('selected-row');
                } else {
                    row.classList.remove('selected-row');
                }
            });
            updateButtonStates();
        });

        // Selecionar linha individual
        document.getElementById('tableBody').addEventListener('change', function(e) {
            if (e.target.classList.contains('row-checkbox')) {
                const row = e.target.closest('tr');
                if (e.target.checked) {
                    row.classList.add('selected-row');
                } else {
                    row.classList.remove('selected-row');
                }
                
                const allCheckboxes = document.querySelectorAll('.row-checkbox');
                const checkedCheckboxes = document.querySelectorAll('.row-checkbox:checked');
                document.getElementById('selectAll').checked = allCheckboxes.length === checkedCheckboxes.length;
                
                updateButtonStates();
            }
        });

        // ===== EXCLUIR =====
        function delete_product(){
            document.getElementById('confirmDelete').classList.add('hidden');
            document.getElementById('loadingBkg').classList.remove('hidden');

            const checkbox = document.querySelector('.row-checkbox:checked');
            const produto = document.getElementById(checkbox.dataset.id);
            const row = document.getElementsByClassName("selected-row")[0]; // coleção

            const product_to_delete = {
                SKU: row.querySelector("#productSku").textContent,
                LOJA: row.querySelector("#productStore").textContent,
                CEP: row.querySelector("#productCep").textContent,
                ESTADO: row.querySelector("#productState").textContent,
            }

            fetch("http://192.168.1.88:5000/delete_product", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(product_to_delete)
            })
            .then(response => {
                document.getElementById('loadingBkg').classList.add('hidden');
                let message = document.getElementById('errorMessageRequest');
                if(response.status == 400){
                    message = document.getElementById('errorMessageRequest');
                } else {
                    document.getElementById(product_to_delete.SKU).remove();
                    message = document.getElementById('successMessage');
                }
                message.value = response.json()["msg"];
                message.style.display = 'flex';

                // Remove mensagem após 2 segundos
                setTimeout(() => {
                    message.style.display = 'none';
                }, 2000);
            }).catch(error => {

            })
        };

        // Cancelar exclusão
        document.getElementById('cancelDelete').addEventListener('click', function() {
            document.getElementById('confirmDelete').classList.add('hidden');
        });

        // Excluir selecionados
        document.getElementById('deleteBtn').addEventListener('click', function() {
            const checkboxes = document.querySelectorAll('.row-checkbox:checked');
            const idsToDelete = Array.from(checkboxes).map(cb => parseInt(cb.dataset.id));
            console.log(idsToDelete);

            document.getElementById('deleteText').textContent = `Deseja excluir ${idsToDelete.length} produto(s)?`;
            document.getElementById('confirmDelete').classList.remove('hidden');
        });

        // Fechar modal ao clicar fora
        document.getElementById('confirmDelete').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });

        //  ===== EDIÇÃO =====
        // Editar selecionado
        document.getElementById('editBtn').addEventListener('click', function() {
            const checkbox = document.querySelector('.row-checkbox:checked');
            const produto = document.getElementById(checkbox.dataset.id);
            console.log(produto);
            console.log(document.getElementsByClassName("selected-row"));
            const row = document.getElementsByClassName("selected-row")[0]; // coleção

            if (produto) {
                document.getElementById('editLoja').value = row.querySelector("#productStore").textContent;
                document.getElementById('editLink').value = row.querySelector("#productLink").href;
                document.getElementById('editSku').value = row.querySelector("#productSku").textContent;
                document.getElementById('editProduto').value = row.querySelector("#productName").textContent;
                document.getElementById('editCep').value = row.querySelector("#productCep").textContent;
                document.getElementById('editEstado').value = row.querySelector("#productState").textContent;
                document.getElementById('editModal').classList.remove('hidden');
            }
        });

        // Cancelar edição
        document.getElementById('cancelEdit').addEventListener('click', function() {
            document.getElementById('editModal').classList.add('hidden');
        });

        // Salvar edição
        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            edit_product();
            document.getElementById('editModal').classList.add('hidden');
        });

        // Fechar modal ao clicar fora
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });

        // ===== ADIÇÃO =====
        // Modal Adicionar Produto
        document.getElementById('addBtn').addEventListener('click', function() {
            document.getElementById('editLoja').value = "";
            document.getElementById('editLink').value = "";
            document.getElementById('editSku').value = "";
            document.getElementById('editProduto').value = "";
            document.getElementById('editCep').value = "";
            document.getElementById('editEstado').value = "";
            document.getElementById('addModal').classList.remove('hidden');
        });

        // Cancelar adição
        document.getElementById('cancelAdd').addEventListener('click', function() {
            document.getElementById('addModal').classList.add('hidden');
        });

        // Adicionar Produto
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            add_product();
            document.getElementById('addModal').classList.add('hidden');
        });

        // Fechar modal ao clicar fora
        document.getElementById('addModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });

        // Máscara para CEP no modal
        document.getElementById('editCep').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 5) {
                value = value.substring(0, 5) + '-' + value.substring(5, 8);
            }
            e.target.value = value;
        });

        // Função para mostrar erro
        function showError(fieldId, message) {
            const field = document.getElementById(fieldId);
            const errorDiv = document.getElementById(fieldId + 'Error');
            field.classList.add('error');
            errorDiv.textContent = message;
        }

        function validateForm(){
            // Limpar mensagens de erro anteriores
            clearErrors();

            let isValid = true;

            // Validar Nome do Produto
            const productName = document.getElementById('productName');
            if (productName.value.trim() === '') {
                showError('productName', 'O nome do produto é obrigatório');
                isValid = false;
            }

            // Validar SKU
            const sku = document.getElementById('sku');
            if (sku.value.trim() === '') {
                showError('sku', 'O SKU é obrigatório');
                isValid = false;
            }

            // Validar URL
            const productUrl = document.getElementById('productUrl');
            if (productUrl.value.trim() === '') {
                showError('productUrl', 'A URL do produto é obrigatória');
                isValid = false;
            } else if (!isValidUrl(productUrl.value)) {
                showError('productUrl', 'Digite uma URL válida (ex: https://exemplo.com)');
                isValid = false;
            }

            // Validar CEP
            const cep = document.getElementById('cep');
            const cepPattern = /^\d{5}-\d{3}$/;
            if (cep.value.trim() === '') {
                showError('cep', 'O CEP é obrigatório');
                isValid = false;
            } else if (!cepPattern.test(cep.value)) {
                showError('cep', 'Digite um CEP válido (00000-000)');
                isValid = false;
            }

            // Validar Estado
            const state = document.getElementById('state');
            if (state.value === '') {
                showError('state', 'Selecione um estado');
                isValid = false;
            }

            // Validar Loja
            const store = document.getElementById('store');
            if (store.value.trim() === '') {
                showError('store', 'O nome da loja é obrigatório');
                isValid = false;
            }

            // Se tudo estiver válido, mostrar mensagem de sucesso
            if (isValid) {
                return true;
            } else {
                return false;
            }
        }

        function edit_product(){
            document.getElementById('loadingBkg').classList.remove('hidden');
            row = document.getElementsByClassName("selected-row")
            console.log(row);
            if(true){
                const original_product = {
                    PRODUTO: row.getElementById('productName').textContent,
                    SKU: row.getElementById('productSku').href,
                    LINK: row.getElementById('productLink').textContent,
                    LOJA: row.getElementById('productStore').textContent,
                    CEP: row.getElementById('productCep').textContent,
                    ESTADO: row.getElementById('productState').textContent,
                }
                const new_product = {
                    PRODUTO: document.getElementById('editProduto').value,
                    SKU: document.getElementById('editSku').value,
                    LINK: document.getElementById('editLink').value,
                    LOJA: document.getElementById('editLoja').value,
                    CEP: document.getElementById('editCep').value,
                    ESTADO: document.getElementById("editEstado").value
                };

                fetch("http://192.168.1.88:5000/edit_product", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({"original": original_product, "new": new_product})
                })
                .then(response => {
                    document.getElementById('loadingBkg').classList.add('hidden');
                    let message = document.getElementById('errorMessageRequest');
                    if(response.status == 400){
                        message = document.getElementById('errorMessageRequest');
                    } else {
                        message = document.getElementById('successMessage');
                    }
                    message.value = response.json()["msg"];
                    message.style.display = 'flex';

                    // Remove mensagem após 2 segundos
                    setTimeout(() => {
                        message.style.display = 'none';
                    }, 2000);
                }).catch(error => {

                })
            }
        }

        // Renderizar tabela
        function addTable(obj) {
            const tableBody = document.getElementById('tableBody');

            tableBody.innerHTML += `
                <tr class="border-b border-gray-200" id="${obj["SKU"]}">
                    <td class="p-3">
                        <input type="checkbox" class="row-checkbox w-4 h-4 cursor-pointer" data-id="${obj["SKU"]}">
                    </td>
                    <td id="productStore" class="p-3 text-gray-800">${obj["LOJA"]}</td>
                    <td class="p-3">
                        <a id="productLink" href="${obj["LINK"]}" target="_blank" class="text-blue-600 hover:underline">
                            ${obj["LINK"].length > 35 ? obj["LINK"].substring(0, 35) + '...' : obj["LINK"]}
                        </a>
                    </td>
                    <td id="productSku" class="p-3 text-gray-800 font-mono">${obj["SKU"]}</td>
                    <td id="productName" class="p-3 text-gray-800">${obj["PRODUTO"]}</td>
                    <td id="productCep" class="p-3 text-gray-800">${obj["CEP"]}</td>
                    <td id="productState" class="p-3 text-gray-800 font-semibold">${obj["ESTADO"]}</td>
                </tr>
            `;
        }

        function add_product(){
            document.getElementById('loadingBkg').classList.remove('hidden');
            if(true){
                const payload = {
                    PRODUTO: document.getElementById('addProduto').value,
                    SKU: document.getElementById('addSku').value,
                    LINK: document.getElementById('addLink').value,
                    LOJA: document.getElementById('addLoja').value,
                    CEP: document.getElementById('addCep').value,
                    ESTADO: document.getElementById("addEstado").value
                };

                fetch("http://192.168.1.88:5000/add_product", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                })
                .then(response => {
                    document.getElementById('loadingBkg').classList.add('hidden');
                    let message = document.getElementById('errorMessageRequest');
                    if(response.status == 400){
                        message = document.getElementById('errorMessageRequest');
                    } else {
                        addTable(payload);
                        message = document.getElementById('successMessage');
                    }
                    message.value = response.json()["msg"];
                    message.style.display = 'flex';

                    // Remove mensagem após 2 segundos
                    setTimeout(() => {
                        message.style.display = 'none';
                    }, 2000);
                }).catch(error => {

                })
            }
        }

        renderTable()

    </script>
</body>
</html>
